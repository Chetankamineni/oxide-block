version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"

    schedule:
      interval: "monthly"

    groups:
      all-dependencies:
        patterns:
          - "*"

    commit-message:
      prefix: "chore"
      include: "scope"

    labels:
      - "dependencies"

    reviewers:
      - "Chetankamineni"
